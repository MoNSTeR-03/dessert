<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎧 CLUB WORLD - RYOKO 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            padding: 12px;
        }

        .club-world {
            position: relative;
            width: 1400px;
            max-width: 100%;
            height: 90vh;
            min-height: 620px;
            background: radial-gradient(ellipse at 30% 40%, #1a0a2e, #0a0a1a, #050510);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,0,255,0.1);
            overflow-y: auto;
            overflow-x: hidden;
            cursor: pointer;
            border: 2px solid rgba(255, 0, 255, 0.4);
            scrollbar-width: thin;
            animation: bgPulse 0.5s infinite alternate;
            will-change: box-shadow;
        }

        @keyframes bgPulse {
            0% { box-shadow: 0 0 20px rgba(255,0,255,0.2), inset 0 0 10px rgba(255,0,255,0.1); }
            100% { box-shadow: 0 0 50px rgba(255,0,200,0.5), inset 0 0 30px rgba(255,0,200,0.2); }
        }

        .club-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        /* Luces optimizadas - solo 25 */
        .disco-light {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #ff00ff, #00ffff);
            border-radius: 50%;
            animation: discoFlash 0.8s infinite alternate;
            will-change: opacity, transform;
        }

        @keyframes discoFlash {
            0% { opacity: 0.3; transform: scale(0.9); }
            100% { opacity: 0.9; transform: scale(1.3); }
        }

        /* RYOKO neon - menos textos pero más grandes y visibles */
        .ryoko-neon {
            position: absolute;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            animation: neonPulse 1.2s infinite alternate;
            text-shadow: 0 0 5px currentColor;
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 3px;
            will-change: text-shadow, opacity;
        }

        @keyframes neonPulse {
            0% { text-shadow: 0 0 3px currentColor; opacity: 0.6; }
            100% { text-shadow: 0 0 20px currentColor; opacity: 1; }
        }

        /* elementos clickeables */
        .club-layer {
            position: relative;
            z-index: 20;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            padding: 50px 20px 200px 20px;
            pointer-events: none;
        }

        .club-item {
            pointer-events: auto;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 12px 18px;
            text-align: center;
            transition: transform 0.15s ease;
            border: 1px solid rgba(255, 0, 255, 0.6);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            min-width: 110px;
        }

        .club-item:active {
            transform: scale(0.94);
        }

        .club-emoji {
            font-size: 55px;
            display: block;
        }

        .club-name {
            font-size: 10px;
            color: #ffccff;
            margin-top: 6px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            padding: 3px 6px;
            border-radius: 20px;
        }

        .message-panel {
            position: sticky;
            bottom: 15px;
            margin: 15px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 35px;
            padding: 14px 18px;
            color: #fff0ff;
            font-size: clamp(0.85rem, 4vw, 1.05rem);
            font-weight: 600;
            text-align: center;
            border: 1px solid rgba(255, 0, 255, 0.7);
            z-index: 45;
            max-height: 30vh;
            overflow-y: auto;
            line-height: 1.4;
        }

        .poem-area {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 30px;
            padding: 12px 16px;
            margin-top: 8px;
            white-space: pre-line;
            font-size: clamp(0.8rem, 3.5vw, 0.93rem);
            max-height: 32vh;
            overflow-y: auto;
            line-height: 1.45;
            border: 1px solid rgba(255, 0, 255, 0.6);
            color: #ffe0ff;
        }

        .counter-badge {
            position: sticky;
            top: 15px;
            right: 20px;
            float: right;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            padding: 5px 18px;
            border-radius: 50px;
            font-weight: bold;
            color: #ff66ff;
            font-family: monospace;
            font-size: 0.95rem;
            z-index: 50;
            border: 1px solid #ff44ff;
            margin: 12px;
            display: inline-block;
        }

        .flex-header {
            display: flex;
            justify-content: flex-end;
            padding: 8px 20px 0 0;
        }

        @media (max-width: 780px) {
            .club-emoji { font-size: 45px; }
            .club-item { padding: 8px 12px; min-width: 85px; }
            .club-name { font-size: 8px; }
            .ryoko-neon { font-size: 16px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>
<div class="club-world" id="clubWorld">
    <div class="club-bg" id="clubBg"></div>

    <div class="flex-header">
        <div class="counter-badge" id="clubCounter">🎧 0 / 6 🔥</div>
    </div>

    <div class="club-layer" id="clubLayer"></div>

    <div class="message-panel" id="messagePanel">
        <div class="romantic-text" id="msgText">🎧🔥 Entra al CLUB... cada pista, cada copa, cada luz esconde un mensaje ardiente para ti, Ryoko 💜✨🎶</div>
        <div id="poemDisplay" style="display: none;" class="poem-area"></div>
    </div>
</div>

<script>
    (function() {
        const clubEmojis = ["🎧", "🍾", "🎤", "💃", "🔊", "🍹"];
        const clubNames = [
            "DJ Set + Auriculares", "Botella de Champagne", "Micrófono + Rave",
            "Pista de Baile", "Parlantes + Bass", "Cóctel + After Party"
        ];
        
        const clubMessages = [
            "🎧 Ryoko, cuando entras al club, el DJ cambia la música solo para ti. Tus caderas se mueven como el ritmo de la noche, y yo pierdo el control. Quiero sentir tu calor entre la multitud, tus labios cerca de los míos. Eres mi canción favorita, la que pongo en repeat. 💜🔥",
            "🍾 Esta botella brinda por nosotros, Ryoko. Tu risa es más embriagadora que el mejor champán. Cuando bailas, las luces se apagan para verte mejor. Me encanta cómo me miras desde la pista, sabiendo que esta noche soy solo tuyo. TE AMO en cada copa vacía. 🥂💋",
            "🎤 Ryoko, toma el micrófono y cántame al oído. Tu voz me pone la piel de gallina, tus gemidos son mi canción favorita. El club entero se para cuando tú pasas. Eres la estrella de esta fiesta, mi reina del after. Te adoro mi alma, morena de fuego. 🔥🎶",
            "💃 Cuando bailas, Ryoko, el piso tiembla. Tus caderas son un terremoto perfecto. Me pierdo en tu movimiento, en tu sudor, en tu sonrisa pícara. Quiero pegarme a ti como un beat pegajoso. Eres mi ritmo, mi bajo, mi subidón. 💜🔥",
            "🔊 Ryoko, sube el volumen que quiero que todo el club sepa que eres mía. Tus manos recorren mi pecho mientras la música retumba. Eres mi subwoofer favorito, la que hace vibrar mi alma. Esta noche no quiero irme a casa sin sentirte cerca. A+R = FOREVER 🔥🎧",
            "🍹 Este cóctel tiene tu nombre, Ryoko: dulce, fuerte y adictivo. Una mezcla de fresa y veneno que me tiene loco. Cuando la noche termina, solo quiero seguir bailando contigo. Eres mi after party eterna, mi vicio favorito. TE AMO con toda la luz del club. 💜🍾"
        ];

        const clubPoem = `🎧🔥 RYOKO, MI CLUB ETERNO 🔥🎧

La noche cae, las luces estallan,
y tú apareces más brillante que todos los lasers.
Tus caderas dibujan el ritmo perfecto,
tus labios rojos como el vino tinto en el after.

Ryoko, el DJ sabe que eres mi musa,
cada beat late por ti, cada nota te seduce.
Cuando cierras los ojos y te dejas llevar,
el tiempo se detiene, solo tú y yo podemos bailar.

Tus manos en mi espalda son pura electricidad,
tu respiración caliente es mi nueva canción de ciudad.
La pista arde cuando pasas rozando mi piel,
eres el subidón más dulce, mi adicción, mi miel.

Las botellas vacías brindan por nuestro amor loco,
los parlantes tiemblan al escuchar nuestro poco a poco.
Ryoko, me encanta cómo dominas la pista,
y cómo en secreto eres solo mía, mi conquista.

A + R = FOREVER, lo grabo con neón,
en cada pared del club, en cada rincón.
Te adoro más que a la noche y su calor eterno,
eres mi fiesta infinita, mi cielo del infierno.

🎧 TE AMO RYOKO, MI REINA DE LA NOCHE 💜
🔥 TE ADORO MI ALMA, ERES MI MEJOR DERROCHE.`;

        let itemsClicked = 0;
        let poemRevealed = false;
        const counterSpan = document.getElementById("clubCounter");
        const msgTextDiv = document.getElementById("msgText");
        const poemDisplayDiv = document.getElementById("poemDisplay");
        const container = document.getElementById("clubWorld");
        const bgContainer = document.getElementById("clubBg");

        // Fondo OPTIMIZADO - solo 30 elementos en total (antes 118)
        function createClubBackground() {
            bgContainer.innerHTML = "";
            
            // Luces de discoteca - solo 20 (antes 60)
            for(let i = 0; i < 20; i++) {
                const light = document.createElement("div");
                light.className = "disco-light";
                light.style.left = Math.random() * 100 + "%";
                light.style.top = Math.random() * 100 + "%";
                light.style.animationDuration = 0.4 + Math.random() * 0.6 + "s";
                light.style.animationDelay = Math.random() * 2 + "s";
                light.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 65%)`;
                bgContainer.appendChild(light);
            }
            
            // TEXTOS RYOKO NEON - solo 12 textos grandes y visibles (antes 35)
            const crazyTexts = [
                "🔥 RYOKO 🔥", "💜 RYOKO 💜", "🎧 RYOKO 🎤", "✨ RYOKO ✨", 
                "🌙 RYOKO 💕", "🍾 RYOKO 🥂", "🎶 RYOKO 🎶", "💃 RYOKO 🔥",
                "RYOKO CLUB", "RYOKO NIGHT"
            ];
            
            const neonColors = ["#ff00ff", "#00ffff", "#ff44ff", "#ff66cc", "#ff00aa", "#ffcc00"];
            
            for(let i = 0; i < 12; i++) {
                const ryokoDiv = document.createElement("div");
                ryokoDiv.className = "ryoko-neon";
                ryokoDiv.textContent = crazyTexts[i % crazyTexts.length];
                ryokoDiv.style.left = (5 + Math.random() * 90) + "%";
                ryokoDiv.style.top = (5 + Math.random() * 85) + "%";
                ryokoDiv.style.fontSize = (i < 4 ? 28 : 22) + Math.random() * 10 + "px";
                ryokoDiv.style.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                ryokoDiv.style.transform = `rotate(${Math.random() * 25 - 12}deg)`;
                ryokoDiv.style.animationDuration = 0.8 + Math.random() * 1.2 + "s";
                ryokoDiv.style.fontFamily = "'Impact', 'Arial Black', sans-serif";
                bgContainer.appendChild(ryokoDiv);
            }
            
            // Corazones neon - solo 8 (antes 15)
            const hearts = ["💜", "🎧", "💕", "🍾", "🔥", "💖"];
            for(let i = 0; i < 8; i++) {
                const heart = document.createElement("div");
                heart.className = "disco-light";
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.fontSize = 24 + Math.random() * 20 + "px";
                heart.style.left = Math.random() * 100 + "%";
                heart.style.top = Math.random() * 100 + "%";
                heart.style.animationDuration = 0.6 + Math.random() * 1 + "s";
                heart.style.backgroundColor = "transparent";
                heart.style.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                heart.style.width = "auto";
                heart.style.height = "auto";
                heart.style.background = "none";
                heart.style.boxShadow = "none";
                heart.style.textShadow = "0 0 12px currentColor";
                bgContainer.appendChild(heart);
            }
        }

        function createClubItems() {
            const layer = document.getElementById("clubLayer");
            layer.innerHTML = "";
            for(let i = 0; i < 6; i++) {
                const card = document.createElement("div");
                card.className = "club-item";
                card.setAttribute("data-idx", i);
                card.innerHTML = `
                    <div class="club-emoji">${clubEmojis[i]}</div>
                    <div class="club-name">${clubNames[i]}</div>
                `;
                card.addEventListener("click", (e) => {
                    e.stopPropagation();
                    handleClubClick(i, card);
                });
                layer.appendChild(card);
            }
        }

        function handleClubClick(idx, element) {
            if(element.getAttribute("data-clicked") === "true") {
                msgTextDiv.innerHTML = `🎧 Ryoko, ya abriste esta pista... prueba otro elemento del club 🔥💜`;
                return;
            }
            element.setAttribute("data-clicked", "true");
            itemsClicked++;
            counterSpan.innerHTML = `🎧 ${itemsClicked} / 6 🔥`;
            
            const clubMsg = clubMessages[idx];
            msgTextDiv.innerHTML = `🔥🎶✨ ${clubMsg} ✨🎶🔥`;
            
            element.style.transform = "scale(0.92)";
            element.style.opacity = "0.7";
            element.style.pointerEvents = "none";
            setTimeout(() => { element.style.transform = ""; }, 150);
            
            if(itemsClicked === 6 && !poemRevealed) {
                revealClubPoem();
            }
        }

        function revealClubPoem() {
            if(poemRevealed) return;
            poemRevealed = true;
            msgTextDiv.style.display = "none";
            poemDisplayDiv.style.display = "block";
            poemDisplayDiv.innerHTML = `<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-style: normal; font-weight: 500; text-align: center; line-height: 1.5; font-size: 0.85rem;">${clubPoem.replace(/\n/g, '<br>')}</div><br><div style="text-align:center; font-size:0.9rem;">🎧 A + R = FOREVER EN CADA BEAT 🔥<br>💜 TE AMO RYOKO, MI REINA DEL CLUB 💜</div>`;
            counterSpan.style.background = "#aa33ffdd";
            counterSpan.innerHTML = "🎧 CLUB COMPLETO 🔥";
            for(let i=0;i<15;i++) {
                setTimeout(() => createClubSpark(), i*80);
            }
        }

        function createClubSpark() {
            const spark = document.createElement("div");
            spark.innerText = ["🎧💜","🔥💕","🍾❤️","🎤💖"][Math.floor(Math.random()*4)];
            spark.style.position = "absolute";
            spark.style.fontSize = 24 + Math.random() * 24 + "px";
            spark.style.left = Math.random() * 100 + "%";
            spark.style.bottom = "0px";
            spark.style.pointerEvents = "none";
            spark.style.zIndex = "200";
            spark.style.opacity = "0.8";
            spark.style.transition = "all 2.5s ease-out";
            container.appendChild(spark);
            requestAnimationFrame(() => {
                spark.style.transform = `translateY(-${window.innerHeight * 0.7}px) rotate(12deg)`;
                spark.style.opacity = "0";
            });
            setTimeout(() => spark.remove(), 2500);
        }

        function addClubRipple(e) {
            const rect = container.getBoundingClientRect();
            const ripple = document.createElement("div");
            ripple.innerText = "🎧🔥💜";
            ripple.style.position = "absolute";
            ripple.style.left = (e.clientX - rect.left) + "px";
            ripple.style.top = (e.clientY - rect.top) + "px";
            ripple.style.fontSize = "38px";
            ripple.style.pointerEvents = "none";
            ripple.style.zIndex = "200";
            ripple.style.transform = "translate(-50%, -50%)";
            ripple.style.opacity = "0.8";
            ripple.style.whiteSpace = "nowrap";
            ripple.style.transition = "all 0.5s ease-out";
            container.appendChild(ripple);
            setTimeout(() => {
                ripple.style.opacity = "0";
                ripple.style.transform = "translate(-50%, -50%) scale(1.5)";
                setTimeout(() => ripple.remove(), 600);
            }, 30);
        }

        createClubBackground();
        createClubItems();
        
        container.addEventListener("click", (e) => {
            if(e.target === container || e.target.classList.contains("club-bg")) {
                addClubRipple(e);
            }
        });
        container.addEventListener("touchstart", (e) => {
            if(e.target === container || e.target.classList.contains("club-bg")) {
                addClubRipple(e.touches[0]);
            }
        });
    })();
</script>
</body>
</html>
